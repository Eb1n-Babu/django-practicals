{% extends 'student_base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<h2 class="mb-3">Are you sure you want to delete this student?</h2>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'students_details' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
